<h1 class="titolone"><img src="/icon/programming.svg" alt="icona di program"> Progetti</h1>
<div class="progetti-section">
    @for(item of lavori;track $index){
    <div class="project-card">
        <div class="riquadro">
            <img class="project-img" [src]="item.img" alt="immagine del progetto">
        </div>

        <div class="project-header">
            <span class="titolo">{{item.titolo}}</span>
            <button class="dettagli" (click)="open(content, item.descrizione, item.titolo, item.tech)">Dettagli
            </button>
        </div>
        <div class="project-body">
            <p class="descrizione">
                {{item.descrizione}}
            </p>
        </div>
        <div class="project-footer">
            <div class="tech-stack">
                @for(item of item.tech; track $index){
                <span class="tech">{{item}}</span>
                }
            </div>
            <div class="btn-container">
                <button><a [href]="item.github" target="_blank"><i class="fa-brands fa-github"></i>Vedi
                        codice</a></button>
                @if (item.link != '') {
                    <button ><a [href]="item.link" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i>
                        Live
                        Demo</a></button>
                }
            </div>
        </div>
    </div>
    }
</div>

<ng-template #content let-modal>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss('Cross click')"></button>
    <div class="modal-body" style="padding: 20px;">
        <h5>{{titolo}}</h5>
        <p>{{descrizione}}</p>
        <h5>Tecnologie utilizzate</h5>
        <ul>
            @for (item of techs; track $index) {
            <li>{{item}}</li>
            }
        </ul>
    </div>
</ng-template>
